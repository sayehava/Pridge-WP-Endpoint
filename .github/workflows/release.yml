name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify PRIDGE_WP_VERSION matches tag
        run: |
          declared=$(grep -oP "PRIDGE_WP_VERSION', '\K[^']+" pridge-wp-endpoint.php)
          if [ "$declared" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match PRIDGE_WP_VERSION ($declared) in pridge-wp-endpoint.php"
            exit 1
          fi

      - name: Extract release notes from readme.txt
        run: |
          awk -v ver="${{ steps.version.outputs.version }}" '
            $0 == "= " ver " =" { found=1; next }
            found && /^= [0-9]+\.[0-9]/ { exit }
            found { print }
          ' readme.txt > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No '= ${{ steps.version.outputs.version }} =' section found in readme.txt. Add one before tagging a release."
            exit 1
          fi

      - name: Build plugin zip with a stable folder name
        run: |
          # GitHub's auto-generated "Source code" archives use a folder named
          # "Pridge-WP-Endpoint-<version>", which changes on every release and makes
          # WordPress treat each install as a brand new plugin. This asset always
          # extracts to "pridge-wp-endpoint" instead, no matter the version.
          mkdir -p /tmp/build/pridge-wp-endpoint
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='release-notes.md' \
            ./ /tmp/build/pridge-wp-endpoint/
          ( cd /tmp/build && zip -rq "${GITHUB_WORKSPACE}/pridge-wp-endpoint.zip" pridge-wp-endpoint )

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            pridge-wp-endpoint.zip
